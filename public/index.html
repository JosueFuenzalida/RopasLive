<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <title>Live Commerce</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/live.css" />
  </head>
  <body>
    <div id="app-shell">
      <header class="topbar">
        <div>
          <h1>Live Commerce</h1>
          <span id="live-status">Preparando venta</span>
        </div>
        <button class="icon-button" id="btn-backup" type="button" title="Respaldar">
          <span aria-hidden="true">BKP</span>
        </button>
      </header>

      <main id="view-container" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Navegacion principal">
        <button data-route="home" type="button">Venta</button>
        <button data-route="clientes" type="button">Clientes</button>
        <button data-route="paquetes" type="button">Paquetes</button>
        <button data-route="reportes" type="button">Reportes</button>
      </nav>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" aria-live="polite"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
